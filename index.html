  <head>
    <meta charset="UTF-8" />

    <title>ClearBuild Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              obsidian: '#020617',
              paper: '#FFFFFF',
              structural: '#94A3B8',
              focus: '#6366f1', // Indigo-500 for interactive elements
              surface: '#0f172a', // Slate-900 for cards/sections
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
            },
            container: {
              center: true,
              padding: '1.5rem',
              screens: {
                sm: '640px',
                md: '768px',
                lg: '1024px',
                xl: '1280px',
              },
            },
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #020617;
        color: #FFFFFF;
      }
      /* Custom scrollbar for a cleaner feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155; 
      }
    </style>
