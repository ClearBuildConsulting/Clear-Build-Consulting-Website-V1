<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Manrope:wght@800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  #card{
    width:1200px;height:630px;background:#020617;position:relative;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 96px;box-sizing:border-box;overflow:hidden;
  }
  /* faint structural grid */
  #card::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:64px 64px;
  }
  .row{display:flex;align-items:center;gap:28px;position:relative;z-index:1}
  svg{width:96px;height:96px}
  .word{font-family:'Manrope',sans-serif;font-weight:800;color:#FFFFFF;font-size:78px;letter-spacing:-0.02em;line-height:1;position:relative;z-index:1}
  .strap{font-family:'DM Mono',monospace;font-weight:500;color:#94a3b8;font-size:22px;letter-spacing:0.3em;text-transform:uppercase;margin-top:36px;position:relative;z-index:1}
  .accent{position:absolute;left:0;top:0;bottom:0;width:10px;background:#6366F1;z-index:1}
</style></head>
<body>
  <div id="card">
    <div class="accent"></div>
    <div class="row">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(10, 10) scale(0.8)">
          <rect x="10" y="35" width="55" height="55" fill="#FFFFFF" rx="2"/>
          <rect x="35" y="10" width="55" height="55" fill="none" stroke="#FFFFFF" stroke-width="8" rx="2"/>
        </g>
      </svg>
      <div class="word">Clear Build</div>
    </div>
    <div class="strap">Consulting &nbsp;&middot;&nbsp; AI &amp; Built Environment Advisory</div>
  </div>
</body>
</html>
