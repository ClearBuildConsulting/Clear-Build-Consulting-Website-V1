<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  #box{width:512px;height:512px;background:#020617;display:flex;align-items:center;justify-content:center}
  svg{width:340px;height:340px}
</style></head>
<body>
  <div id="box">
    <!-- Clear Build monogram: solid block + outlined block (the transparent stack) -->
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(10, 10) scale(0.8)">
        <rect x="10" y="35" width="55" height="55" fill="#FFFFFF" rx="2"/>
        <rect x="35" y="10" width="55" height="55" fill="none" stroke="#FFFFFF" stroke-width="8" rx="2"/>
      </g>
    </svg>
  </div>
</body>
</html>
